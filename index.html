<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <!-- framework bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- libreria de iconos -->
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>

    <!-- logotipo del sistema de la aplicación de matricula -->
     <link rel="shortcut icon" href="imgxd/pexels-dhenry-7486212(1).jpg" type="image/x-icon">

     <!-- hoja de estilos -->
      <link rel="stylesheet" href="css/styles.css">
     
</head>
<body class="contenedor">
    <article class="contenedor">
        <form id="formRegistro" class="formulario">
            <h2 class="titulo">Registro de Nuevo Alumno</h2>
            <input class="texto" id="regNombres" name="nombres" placeholder="Nombres" required>
            <input class="texto" type="text" id="regApellidos" name="apellidos" placeholder="Apellidos" required>
            <input class="texto" type="text" id="regDni" name="dni" placeholder="N° DNI (8 dígitos)" maxlength="8" required>
            <input class="texto" type="email" id="regCorreo" name="correo" placeholder="Correo Electrónico" required>
            <input class="texto" type="date" id="regNacimiento" name="nacimiento" required>
            
            <input class="texto" type="text" id="apoNombres" name="apoNombres" placeholder="Nombres del Apoderado" required>
            <input class="texto" type="text" id="apoCelular" name="apoCelular" placeholder="Celular del Apoderado" maxlength="9" required>
            
            <button class="boton" type="submit">Registrarse</button>
            <p id="mensajeRegistro" class="mensaje"></p>
        </form>

        <form id="formLogin" class="formulario" style="display:none;">
            <h2>Iniciar Sesión</h2>
            <input class="texto" type="text" id="logUsuario" placeholder="N° DNI o Usuario" required>
            <input class="texto" type="password" id="logPassword" placeholder="Contraseña asignada" required>
            <button type="submit">Ingresar</button>
            <p id="mensajeLogin" class="mensaje"></p>
        </form>
        
        <button  id="btnAlternarVista">  <a href="login.html"><h3  class="bdos">Iniciar Sesión</h3>
        </a></button>
    </article>
    <script src="js/app.js"></script>


    <!-- libreria de js de bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <a href="#"></a>
</html>
